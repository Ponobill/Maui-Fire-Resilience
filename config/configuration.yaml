
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
template: !include_dir_merge_list includes/templates/
sensor:
  - platform: rest
    name: "FIRMS Big Island MODIS Active Fires"
    unique_id: "firms_big_island_modis_active_fires"
    resource: "https://firms.modaps.eosdis.nasa.gov/api/area/csv/1c86f84610c15adc2207cf8d43ab89a2/MODIS_NRT/-156.1,18.9,-154.8,20.3/1"
    method: GET
    scan_interval: 3600
    value_template: >
      {% set lines = value.split('\n') | select('match', '^[0-9]') | list %}
      {{ lines | length }}
    unit_of_measurement: "detections"
